<!-- ================================================= -->
<!-- CONTACT SECTION -->
<!-- ================================================= -->

<section
    id="contact"
    class="relative py-24 bg-[#292845] overflow-hidden">

    <!-- Background Glow -->

    <div
        class="absolute top-0 left-0 w-96 h-96 rounded-full bg-[#515272] blur-[150px] opacity-20">
    </div>

    <div
        class="absolute bottom-0 right-0 w-80 h-80 rounded-full bg-[#C5AAA4] blur-[170px] opacity-10">
    </div>

    <div class="max-w-7xl mx-auto px-8 relative z-10">

        <!-- Heading -->

        <div
            class="text-center mb-20"
            data-aos="fade-up">

            <h2
                class="text-5xl font-bold text-[#E5DAD3]">

                ✉️ Contact

                <span class="text-[#C5AAA4]">

                    Me

                </span>

            </h2>
        </div>

        <!-- Two Column Layout -->

        <div
            class="grid lg:grid-cols-2 gap-12">

            <!-- ================================================= -->
            <!-- LEFT : CONTACT FORM -->
            <!-- ================================================= -->

        <div
            class="contact-card
            p-10">

                <h3
                    class="text-3xl font-bold text-[#E5DAD3]">

                    Get In Touch

                </h3>

    

                <form
                    id="contactForm"
                    class="mt-10 space-y-6">

                    <!-- Name -->

                    <div>

                        <label
                            class="block mb-2 text-[#E5DAD3]">

                            Full Name

                        </label>

                        <input
                            type="text"
                            id="name"
                            required
                            placeholder="Enter your name"
                            class="w-full
                            bg-[#292845]
                            border border-[#9A8F9B]/40
                            rounded-xl
                            px-5
                            py-4
                            text-white
                            focus:border-[#C5AAA4]
                            focus:outline-none">

                    </div>

                    <!-- Email -->

                    <div>

                        <label
                            class="block mb-2 text-[#E5DAD3]">

                            Email Address

                        </label>

                        <input
                            type="email"
                            id="email"
                            required
                            placeholder="Enter your email"
                            class="w-full
                            bg-[#292845]
                            border border-[#9A8F9B]/40
                            rounded-xl
                            px-5
                            py-4
                            text-white
                            focus:border-[#C5AAA4]
                            focus:outline-none">

                    </div>

                    <!-- Message -->

                    <div>

                        <label
                            class="block mb-2 text-[#E5DAD3]">

                            Message

                        </label>

                        <textarea
                            id="message"
                            rows="6"
                            required
                            placeholder="Write your message..."
                            class="w-full
                            bg-[#292845]
                            border border-[#9A8F9B]/40
                            rounded-xl
                            px-5
                            py-4
                            text-white
                            resize-none
                            focus:border-[#C5AAA4]
                            focus:outline-none"></textarea>

                    </div>

                    <!-- Button -->

                    <button
                        id="sendBtn"
                        type="submit"
                        class="w-full
                        py-4
                        rounded-xl
                        bg-[#C5AAA4]
                        text-[#292845]
                        font-bold
                        text-lg
                        hover:scale-105
                        transition">

                        <i class="fa-solid fa-paper-plane mr-2"></i>

                        Send Message

                    </button>

                    <!-- Status -->

                    <p
                        id="formStatus"
                        class="text-center mt-4"></p>

                </form>

            </div>

            <!-- ================================================= -->
            <!-- RIGHT : CONNECT -->
            <!-- ================================================= -->

            <div
                class="contact-card
                p-10">

                <h3
                    class="text-3xl font-bold text-[#E5DAD3]">

                    Connect With Me

                </h3>

                <p
                    class="mt-4 text-[#E5DAD3]/70">

                    You can also reach me through the platforms below.

                </p>

                <div class="mt-10 space-y-5">

                    <!-- GitHub -->

                    <a
                        href="https://github.com/Bhagyashree1608"
                        target="_blank"
                        class="flex justify-between items-center
                        p-5
                        rounded-xl
                        bg-[#292845]
                        hover:bg-[#515272]
                        transition">

                        <div class="flex items-center gap-4">

                            <i class="fab fa-github text-3xl text-[#C5AAA4]"></i>

                            <span class="text-lg">GitHub</span>

                        </div>

                        <i class="fa-solid fa-arrow-up-right-from-square"></i>

                    </a>

                    <!-- LinkedIn -->

                    <a
                        href="https://www.linkedin.com/in/bhagyashree-mistari-25b7992b2/"
                        target="_blank"
                        class="social-link">

                        <div class="flex items-center gap-4">

                            <i class="fab fa-linkedin text-3xl text-[#C5AAA4]"></i>

                            <span class="text-lg">LinkedIn</span>

                        </div>

                        <i class="fa-solid fa-arrow-up-right-from-square"></i>

                    </a>

                    <!-- LeetCode -->

                    <a
                        href="https://leetcode.com/u/bhagyashree-mistari16/"
                        target="_blank"
                        class="social-link">

                        <div class="flex items-center gap-4">

                            <i class="fa-solid fa-code text-3xl text-[#C5AAA4]"></i>

                            <span class="text-lg">LeetCode</span>

                        </div>

                        <i class="fa-solid fa-arrow-up-right-from-square"></i>

                    </a>

                    <!-- Email -->

                    <a
                        href="mailto:mistaribhagyashree@gmail.com"
                        class="social-link">

                        <div class="flex items-center gap-4">

                            <i class="fa-solid fa-envelope text-3xl text-[#C5AAA4]"></i>

                            <span class="text-lg">mistaribhagyashree@gmail.com</span>

                        </div>

                    </a>

                    <!-- Phone -->

                    <a
                        href="tel:+919307519847"
                        class="social-link">

                        <div class="flex items-center gap-4">

                            <i class="fa-solid fa-phone text-3xl text-[#C5AAA4]"></i>

                            <span class="text-lg">+91 9307519847</span>

                        </div>

                    </a>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
