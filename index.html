    <script>

async function loadSection(id, file) {

    const response = await fetch(file);

    document.getElementById(id).innerHTML =
        await response.text();

}

async function loadPortfolio() {

await Promise.all([

    loadSection("navbar", "sections/navbar.html"),
    loadSection("hero", "sections/hero.html"),
    // loadSection("about", "sections/about.html"), // Uncomment only if <div id="about"></div> exists
    loadSection("skills", "sections/skills.html"),
    loadSection("education", "sections/education.html"),
    loadSection("experience", "sections/experience.html"),
    loadSection("projects", "sections/projects.html"),
    loadSection("achievements", "sections/achievements.html"),
    loadSection("certificates", "sections/certificates.html"),
    loadSection("contact", "sections/contact.html"),
    loadSection("footer", "sections/footer.html")

]);

AOS.refresh();

initNavbar();
initContactForm();

loadProjects();
loadAchievements();
loadCertificates();

}

loadPortfolio();

</script>
